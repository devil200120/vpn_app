<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ShieldVPN</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      width: 360px;
      background: #060612;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 480px;
    }
    .header {
      display:flex; align-items:center; justify-content:space-between;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
    }
    .logo { display:flex; align-items:center; gap:9px; }
    .logo-icon {
      width:30px; height:30px;
      background: linear-gradient(135deg,#7c3aed,#6d28d9);
      border-radius:8px;
      display:flex; align-items:center; justify-content:center;
      font-size:15px;
    }
    .logo-text { font-size:15px; font-weight:700; letter-spacing:-0.3px; }
    .tier-badge {
      padding:3px 9px; border-radius:20px;
      font-size:10px; font-weight:700;
      text-transform:uppercase; letter-spacing:0.5px;
    }

    /* ── Login ── */
    #loginView { padding:0; }
    .login-body { padding:22px 18px 18px; }
    .login-title { font-size:19px; font-weight:700; margin-bottom:5px; }
    .login-sub { color:rgba(255,255,255,0.4); font-size:12px; margin-bottom:20px; }
    .form-group { margin-bottom:12px; }
    .form-group label { display:block; font-size:11px; color:rgba(255,255,255,0.45); margin-bottom:5px; }
    .form-group input {
      width:100%; padding:9px 13px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:9px; color:#fff; font-size:13px;
      outline:none; transition:border-color 0.2s;
    }
    .form-group input:focus { border-color:rgba(124,58,237,0.5); }
    .form-group input::placeholder { color:rgba(255,255,255,0.22); }
    .btn-primary {
      width:100%; padding:10px;
      background:linear-gradient(135deg,#7c3aed,#6d28d9);
      border:none; border-radius:9px;
      color:#fff; font-size:13px; font-weight:600;
      cursor:pointer; transition:opacity 0.2s; margin-top:2px;
    }
    .btn-primary:hover { opacity:0.9; }
    .btn-primary:disabled { opacity:0.45; cursor:not-allowed; }
    .error-msg { color:#f87171; font-size:11px; margin-top:8px; text-align:center; min-height:16px; }

    /* ── Main ── */
    #mainView { display:none; }

    .status-card {
      margin:14px; padding:18px;
      border-radius:14px; text-align:center;
      border:1px solid rgba(255,255,255,0.07);
      background:rgba(255,255,255,0.03);
      transition:all 0.3s;
    }
    .status-card.connected {
      background:rgba(16,185,129,0.07);
      border-color:rgba(16,185,129,0.22);
    }
    .status-indicator {
      width:54px; height:54px; border-radius:50%;
      margin:0 auto 10px;
      display:flex; align-items:center; justify-content:center;
      font-size:22px;
      background:rgba(255,255,255,0.04);
      border:2px solid rgba(255,255,255,0.09);
    }
    .status-indicator.connected {
      background:rgba(16,185,129,0.13);
      border-color:rgba(16,185,129,0.38);
      animation:pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100%{ box-shadow:0 0 0 0 rgba(16,185,129,0.3); }
      50%{ box-shadow:0 0 0 10px rgba(16,185,129,0); }
    }
    .status-text { font-size:14px; font-weight:600; margin-bottom:3px; }
    .status-sub { font-size:11px; color:rgba(255,255,255,0.38); }

    .section { padding:0 14px 10px; }
    .section-label {
      font-size:10px; color:rgba(255,255,255,0.3);
      font-weight:600; text-transform:uppercase; letter-spacing:0.8px;
      margin-bottom:7px;
    }
    .server-list {
      display:flex; flex-direction:column; gap:5px;
      max-height:190px; overflow-y:auto;
    }
    .server-list::-webkit-scrollbar { width:3px; }
    .server-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:10px; }
    .server-item {
      display:flex; align-items:center; gap:9px;
      padding:9px 11px; border-radius:9px;
      cursor:pointer; border:1px solid transparent;
      transition:all 0.15s;
      background:rgba(255,255,255,0.03);
    }
    .server-item:hover:not(.locked) { background:rgba(255,255,255,0.06); }
    .server-item.selected {
      background:rgba(124,58,237,0.1);
      border-color:rgba(124,58,237,0.28);
    }
    .server-item.locked { opacity:0.38; cursor:not-allowed; }
    .server-flag { font-size:17px; }
    .server-info { flex:1; }
    .server-name { font-size:12px; font-weight:500; }
    .server-detail { font-size:10px; color:rgba(255,255,255,0.32); margin-top:1px; }
    .server-meta { font-size:10px; font-weight:600; color:#10b981; }

    .connect-section { padding:10px 14px 14px; }
    .btn-connect {
      width:100%; padding:12px;
      border-radius:11px; border:none;
      font-size:14px; font-weight:700;
      cursor:pointer; transition:all 0.2s;
      background:linear-gradient(135deg,#7c3aed,#6d28d9);
      color:#fff;
    }
    .btn-connect.disconnecting, .btn-connect.connected {
      background:transparent;
      border:1px solid rgba(239,68,68,0.3);
      color:#f87171;
    }
    .btn-connect:disabled { opacity:0.45; cursor:not-allowed; }
    .btn-connect:hover:not(:disabled) { transform:translateY(-1px); }

    .footer {
      padding:9px 14px;
      border-top:1px solid rgba(255,255,255,0.05);
      display:flex; align-items:center; justify-content:space-between;
    }
    .footer-info { font-size:10px; color:rgba(255,255,255,0.22); }
    .btn-logout {
      font-size:10px; color:rgba(255,255,255,0.32);
      background:none; border:none; cursor:pointer;
      padding:3px 7px; border-radius:5px; transition:all 0.15s;
    }
    .btn-logout:hover { color:rgba(255,255,255,0.6); background:rgba(255,255,255,0.05); }
    .loading-text { text-align:center; padding:30px 20px; color:rgba(255,255,255,0.35); font-size:12px; }
  </style>
</head>
<body>

  <!-- Login View -->
  <div id="loginView">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">🛡️</div>
        <span class="logo-text">ShieldVPN</span>
      </div>
    </div>
    <div class="login-body">
      <div class="login-title">Welcome back</div>
      <div class="login-sub">Sign in to activate VPN protection</div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn-primary" id="loginBtn">Sign In</button>
      <div class="error-msg" id="loginError"></div>
    </div>
  </div>

  <!-- Main View -->
  <div id="mainView">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">🛡️</div>
        <span class="logo-text">ShieldVPN</span>
      </div>
      <span class="tier-badge" id="tierBadge">FREE</span>
    </div>

    <div class="status-card" id="statusCard">
      <div class="status-indicator" id="statusIndicator">🔒</div>
      <div class="status-text" id="statusText">Unprotected</div>
      <div class="status-sub" id="statusSub">Select a server and connect</div>
    </div>

    <div class="section">
      <div class="section-label">Select Server</div>
      <div class="server-list" id="serverList">
        <div class="loading-text">Loading servers…</div>
      </div>
    </div>

    <div class="connect-section">
      <button class="btn-connect" id="connectBtn">🔒 Connect</button>
    </div>

    <div class="footer">
      <span class="footer-info" id="userEmail"></span>
      <button class="btn-logout" id="logoutBtn">Sign out</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
